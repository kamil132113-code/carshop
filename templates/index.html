<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АвтоСалон</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 24px; }
    header p  { font-size: 14px; color: #aaa; margin-top: 4px; }

    header a {
      background: #e94560;
      color: white;
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      background: #16213e;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 { font-size: 36px; margin-bottom: 12px; }
    .hero p  { font-size: 16px; color: #aaa; }

    section {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    section h3 {
      font-size: 22px;
      margin-bottom: 24px;
      color: #1a1a2e;
    }

    .cars {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #eee;
    }

    .card-body { padding: 16px; }

    .card-body h4 { font-size: 17px; margin-bottom: 6px; }

    .card-body .price {
      font-size: 20px;
      font-weight: bold;
      color: #e94560;
      margin-bottom: 8px;
    }

    .card-body .year {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    .card-body button {
      width: 100%;
      padding: 10px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .card-body button:hover { background: #e94560; }

    .form-wrap {
      background: white;
      border-radius: 10px;
      padding: 32px;
      max-width: 500px;
      margin: 0 auto 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-wrap input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
    }

    .form-wrap button {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .form-wrap button:hover { background: #c73652; }

    #msg {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: green;
    }

    footer {
      background: #1a1a2e;
      color: #aaa;
      text-align: center;
      padding: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>АвтоСалон</h1>
    <p>Новые автомобили с гарантией</p>
  </div>
  <a href="#contact">Оставить заявку</a>
</header>

<div class="hero">
  <h2>Найди свой автомобиль</h2>
  <p>Большой выбор новых машин по лучшим ценам</p>
</div>

<section>
  <h3>Автомобили в наличии</h3>
  <div class="cars" id="cars"></div>
</section>

<section id="contact">
  <h3>Оставить заявку</h3>
  <div class="form-wrap">
    <input type="text" id="name"  placeholder="Ваше имя">
    <input type="tel"  id="phone" placeholder="Телефон">
    <button onclick="sendLead()">Перезвоните мне</button>
    <div id="msg"></div>
  </div>
</section>

<footer>
  © 2026 АвтоСалон. Все права защищены.
</footer>

<script>
  fetch("/cars")
    .then(r => r.json())
    .then(cars => {
      const grid = document.getElementById("cars");
      cars.forEach(car => {
        grid.innerHTML += `
          <div class="card">
            <img src="${car.photo}" alt="${car.brand} ${car.model}">
            <div class="card-body">
              <h4>${car.brand} ${car.model}</h4>
              <div class="year">${car.year} год</div>
              <div class="price">${car.price.toLocaleString("ru-RU")} ₽</div>
              <button onclick="selectCar(${car.id}, '${car.brand} ${car.model}')">
                Хочу эту машину
              </button>
            </div>
          </div>`;
      });
    });

  let selectedCarId = null;

  function selectCar(id, name) {
    selectedCarId = id;
    document.getElementById("contact").scrollIntoView({ behavior: "smooth" });
    document.getElementById("msg").textContent = "Выбрано: " + name;
    document.getElementById("msg").style.color = "#1a1a2e";
  }

  function sendLead() {
    const name  = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const msg   = document.getElementById("msg");

    if (!name || !phone) {
      msg.textContent = "Заполните имя и телефон";
      msg.style.color = "red";
      return;
    }

    fetch("/leads", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, car_id: selectedCarId })
    })
    .then(r => r.json())
    .then(() => {
      msg.textContent = "Заявка отправлена! Мы перезвоним вам.";
      msg.style.color = "green";
      document.getElementById("name").value  = "";
      document.getElementById("phone").value = "";
      selectedCarId = null;
    });
  }
</script>

</body>
</html>
